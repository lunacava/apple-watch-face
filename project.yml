name: VerticalSlider
options:
  bundleIdPrefix: com.verticalslider
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"

targets:
  VerticalSlider:
    type: application
    platform: iOS
    sources:
      - VerticalSlider
    settings:
      base:
        INFOPLIST_FILE: VerticalSlider/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.verticalslider.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"

  VerticalSliderWatch:
    type: application
    platform: watchOS
    sources:
      - path: VerticalSliderWatch
        excludes:
          - "*.otf"
      - path: VerticalSliderWatch/OCRAExt.otf
        type: file
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: VerticalSliderWatch/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.verticalslider.app.watchkitapp
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        CODE_SIGN_ENTITLEMENTS: VerticalSliderWatch/VerticalSliderWatch.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 6MG2C5ZMJ4
    dependencies:
      - sdk: HealthKit.framework
